spring.application.name=cloud-storage-system


#Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cloud_storage_system?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# LAZY INITIALIZATION (VERY IMPORTANT)
spring.main.lazy-initialization=true


# JPA / HIBERNATE OPTIMIZATION
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


# HIKARI CONNECTION POOL (DB PERFORMANCE)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000


# JACKSON OPTIMIZATION

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null



#security
jwt.secret=8332a737268989d266252bef7409abb7608c8307f9409909ee4057d1e85771781e5be28832fecfd66f868ea1a68bfbca964500332e58c6c811a61dc93a5714b0
jwt.access-token-validity=900000
jwt.refresh-token-validity=604800000


otp.expiry.minutes=5
security.max-failed-attempts=5
security.lock-time-minutes=5
security.password-history-limit=5

